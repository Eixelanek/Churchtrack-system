<!DOCTYPE html>
<html>
<head>
    <title>Test Attendance Export</title>
</head>
<body>
    <h2>Test Attendance Report Export</h2>
    
    <form method="POST" action="https://churchtrack.infinityfreeapp.com/api/reports/export_attendance.php" target="_blank">
        <label>Start Date:</label>
        <input type="date" name="startDate" value="2026-02-01"><br><br>
        
        <label>End Date:</label>
        <input type="date" name="endDate" value="2026-03-08"><br><br>
        
        <label>Format:</label>
        <select name="format">
            <option value="xlsx">Excel (XLSX)</option>
            <option value="pdf">PDF</option>
        </select><br><br>
        
        <button type="submit">Download Report</button>
    </form>
</body>
</html>
