<!DOCTYPE html>
<html>
<head>
    <title>Test Export POST</title>
</head>
<body>
    <h2>Test Attendance Export (POST)</h2>
    <button onclick="testExport()">Test Excel Export</button>
    
    <script>
    function testExport() {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://churchtrack.infinityfreeapp.com/api/reports/export_attendance.php';
        
        const formatInput = document.createElement('input');
        formatInput.type = 'hidden';
        formatInput.name = 'format';
        formatInput.value = 'xlsx';
        form.appendChild(formatInput);
        
        const startInput = document.createElement('input');
        startInput.type = 'hidden';
        startInput.name = 'startDate';
        startInput.value = '2026-02-01';
        form.appendChild(startInput);
        
        const endInput = document.createElement('input');
        endInput.type = 'hidden';
        endInput.name = 'endDate';
        endInput.value = '2026-03-08';
        form.appendChild(endInput);
        
        document.body.appendChild(form);
        form.submit();
    }
    </script>
</body>
</html>
